; ============================================================
; ESP-Nail Hardware Test Sketch
; Run on a bare ESP32 DevKit - no other components needed
; Tests: Serial, GPIO, NVS, WiFi, I2C, SPI, LED, ADC, Memory
; ============================================================

[env:test_hw]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall
